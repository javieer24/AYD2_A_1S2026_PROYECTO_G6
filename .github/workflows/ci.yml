name: PRCCD CI/CD Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  # ─── FASE TEST ───────────────────────────────────────────────
  test:
    name: "Test — Pruebas Unitarias"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '18'

      - name: Test ingesta-service (Adaptadores USAC/UCR/UES)
        working-directory: prccd-mvp/services/ingesta-service
        run: |
          npm install
          npm test

      - name: Test examen-service (Motor adaptativo)
        working-directory: prccd-mvp/services/examen-service
        run: |
          npm install
          npm test

  # ─── FASE BUILD ──────────────────────────────────────────────
  build:
    name: "Build — Imágenes Docker"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/auth-service
          push: true
          tags: ghcr.io/javieer24/prccd-auth-service:latest

      - name: Build y Push ingesta-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/ingesta-service
          push: true
          tags: ghcr.io/javieer24/prccd-ingesta-service:latest

      - name: Build y Push examen-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/examen-service
          push: true
          tags: ghcr.io/javieer24/prccd-examen-service:latest

      - name: Build y Push certificado-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/certificado-service
          push: true
          tags: ghcr.io/javieer24/prccd-certificado-service:latest

      - name: Build y Push telemetria-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/telemetria-service
          push: true
          tags: ghcr.io/javieer24/prccd-telemetria-service:latest

      - name: Build y Push auditoria-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/auditoria-service
          push: true
          tags: ghcr.io/javieer24/prccd-auditoria-service:latest

      - name: Build y Push dashboard-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/dashboard-service
          push: true
          tags: ghcr.io/javieer24/prccd-dashboard-service:latest

      - name: Build y Push notificaciones-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/notificaciones-service
          push: true
          tags: ghcr.io/javieer24/prccd-notificaciones-service:latest

      - name: Build y Push voz-service
        uses: docker/build-push-action@v5
        with:
          context: prccd-mvp/services/voz-service
          push: true
          tags: ghcr.io/javieer24/prccd-voz-service:latest

  # ─── FASE DEPLOY STAGING ─────────────────────────────────────
  deploy-staging:
    name: "Deploy — Staging"
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy en EC2 Staging
        run: |
          cd /home/ec2-user/prccd
          git pull origin develop
          cd prccd-mvp
          docker compose pull
          docker compose up -d --remove-orphans
          docker system prune -f
          
  # ─── FASE DEPLOY PRODUCCIÓN ──────────────────────────────────
  deploy-produccion:
    name: "Deploy — Producción"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: produccion

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Deploy en EC2 Producción
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/prccd
            git pull origin main
            cd prccd-mvp
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f