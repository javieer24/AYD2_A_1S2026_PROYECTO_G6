version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: prccd_postgres
    environment:
      POSTGRES_DB: prccd_db
      POSTGRES_USER: prccd_user
      POSTGRES_PASSWORD: prccd_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - prccd_network

  mongodb:
    image: mongo:6-jammy
    container_name: prccd_mongo
    environment:
      MONGO_INITDB_DATABASE: prccd_docs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - prccd_network

  minio:
    image: minio/minio:latest
    container_name: prccd_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - prccd_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prccd_backend
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: prccd_db
      DB_USER: prccd_user
      DB_PASSWORD: prccd_pass
      MONGO_URI: mongodb://mongodb:27017/prccd_docs
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: evidencias
      JWT_SECRET: prccd_secret_2026
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - mongodb
      - minio
    networks:
      - prccd_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: prccd_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - prccd_network

volumes:
  postgres_data:
  mongo_data:
  minio_data:

networks:
  prccd_network:
    driver: bridges