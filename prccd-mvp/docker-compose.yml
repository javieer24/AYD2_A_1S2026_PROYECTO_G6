version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: prccd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prccd_db
      POSTGRES_USER: prccd_user
      POSTGRES_PASSWORD: prccd_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_create_candidatos.sql:/docker-entrypoint-initdb.d/001_create_candidatos.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prccd_user -d prccd_db']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: prccd_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: prccd_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prccd_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      minio:
        condition: service_started
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: prccd_db
      DB_USER: prccd_user
      DB_PASSWORD: prccd_pass
      MONGO_URI: mongodb://mongodb:27017/prccd_docs
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: evidencias
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongo_data:
  minio_data:
