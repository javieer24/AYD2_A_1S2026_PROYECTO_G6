# nginx.conf
# Responsable: Oswaldo Antonio Choc Cuteres — 201901844
# Tarea: F2-29
#
# Gateway de microservicios: un upstream por dominio de negocio en vez de un
# solo backend monolitico (rama feature/migracion-microservicios).

events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:3001;
    }
    upstream ingesta_service {
        server ingesta-service:3002;
    }
    upstream examen_service {
        server examen-service:3003;
    }
    upstream certificado_service {
        server certificado-service:3004;
    }
    upstream telemetria_service {
        server telemetria-service:3005;
    }
    upstream auditoria_service {
        server auditoria-service:3006;
    }
    upstream dashboard_service {
        server dashboard-service:3007;
    }
    upstream notificaciones_service {
        server notificaciones-service:3008;
    }
    upstream voz_service {
        server voz-service:3009;
    }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;

        # CORS — permite peticiones del frontend
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            return 204;
        }

        # Health check de cada microservicio
        location /health/auth         { proxy_pass http://auth_service/health; }
        location /health/ingest       { proxy_pass http://ingesta_service/health; }
        location /health/examen       { proxy_pass http://examen_service/health; }
        location /health/certificate  { proxy_pass http://certificado_service/health; }
        location /health/telemetria   { proxy_pass http://telemetria_service/health; }
        location /health/audit        { proxy_pass http://auditoria_service/health; }
        location /health/dashboard    { proxy_pass http://dashboard_service/health; }
        location /health/notificaciones     { proxy_pass http://notificaciones_service/health; }
        location /health/voz          { proxy_pass http://voz_service/health; }

        # API Routes — una por dominio
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
        }

        location /api/ingest {
            proxy_pass http://ingesta_service/api/ingest;
        }

        location /api/examen/ {
            proxy_pass http://examen_service/api/examen/;
        }

        location /api/certificate/ {
            proxy_pass http://certificado_service/api/certificate/;
        }

        location /api/telemetria/ {
            proxy_pass http://telemetria_service/api/telemetria/;
        }
        location = /api/telemetria {
            proxy_pass http://telemetria_service/api/telemetria;
        }

        location /api/audit/ {
            proxy_pass http://auditoria_service/api/audit/;
        }

        location /api/dashboard/ {
            proxy_pass http://dashboard_service/api/dashboard/;
        }

        location /api/voz/ {
            client_max_body_size 26m;
            proxy_pass http://voz_service/api/voz/;
        }
    }
}
